name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Node syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check JS syntax (node --check)
        run: |
          find . -name "*.js" \
            ! -path "./node_modules/*" \
            ! -path "./.github/*" \
            -exec node --check {} \;

  test:
    name: Test (Node ${{ matrix.node }})
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['18', '20', '22']  

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node == '20'       
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build verification
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production deps only
        run: npm install --omit=dev

      - name: Verify app starts and exits cleanly
        run: |
          timeout 5 node -e "
            const createApp = require('./app');
            const app = createApp();
            const server = app.listen(0, () => {
              console.log('✅ App started on port', server.address().port);
              server.close(() => process.exit(0));
            });
          " || true

      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r dist/swagstore.zip . \
            --exclude "node_modules/*" \
            --exclude ".git/*" \
            --exclude "coverage/*" \
            --exclude "dist/*" \
            --exclude "*.bak"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagstore-build-${{ github.sha }}
          path: dist/swagstore.zip
          retention-days: 14

  deploy:
    name: Deploy to production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://swagstore.example.com  

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install production deps
        run: npm install --omit=dev

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: swagstore-build-${{ github.sha }}
          path: dist/


      - name: Deploy step placeholder
        run: |
          echo "Artifact ready at dist/swagstore.zip"
          echo "Uncomment the deploy option that matches your host."
          echo "Commit SHA: ${{ github.sha }}"
